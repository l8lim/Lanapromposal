<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Prom?</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      min-height: 100%;
      min-height: -webkit-fill-available;
    }

    body {
      min-height: 100vh;
      min-height: 100svh;
      min-height: -webkit-fill-available;
      font-family: "Poppins", "Segoe UI", sans-serif;
      overflow: hidden;
      color: white;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.9), transparent 8%),
        radial-gradient(circle at 80% 15%, rgba(255, 203, 230, 0.9), transparent 12%),
        radial-gradient(circle at 50% 85%, rgba(255, 123, 190, 0.65), transparent 18%),
        linear-gradient(135deg, #ff8ac9, #ff5fb3 35%, #b675ff 70%, #7bdcff);
    }

    .sparkles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.95) 1px, transparent 1px),
        radial-gradient(circle, rgba(255,255,255,0.8) 1px, transparent 1px),
        radial-gradient(circle, rgba(255,219,246,0.9) 2px, transparent 2px);
      background-size: 70px 70px, 120px 120px, 170px 170px;
      animation: drift 16s linear infinite;
    }

    @keyframes drift {
      from { transform: translateY(0); }
      to { transform: translateY(-180px); }
    }

    .hearts span {
      position: absolute;
      bottom: -80px;
      font-size: 28px;
      opacity: 0.65;
      animation: floatUp 9s linear infinite;
    }

    .hearts span:nth-child(1) { left: 8%; animation-delay: 0s; }
    .hearts span:nth-child(2) { left: 22%; animation-delay: 2s; font-size: 42px; }
    .hearts span:nth-child(3) { left: 41%; animation-delay: 4s; }
    .hearts span:nth-child(4) { left: 64%; animation-delay: 1s; font-size: 36px; }
    .hearts span:nth-child(5) { left: 83%; animation-delay: 3s; }

    @keyframes floatUp {
      0% { transform: translateY(0) rotate(0deg) scale(0.8); opacity: 0; }
      15% { opacity: 0.8; }
      100% { transform: translateY(-115vh) rotate(360deg) scale(1.4); opacity: 0; }
    }

    .surprise-popup {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: #000;
      backdrop-filter: blur(16px);
      transition: opacity 0.7s ease, visibility 0.7s ease;
    }

    .surprise-popup.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .popup-card {
      width: min(520px, 100%);
      padding: 38px 28px;
      border-radius: 32px;
      text-align: center;
      background: rgba(255, 255, 255, 0.25);
      border: 2px solid rgba(255, 255, 255, 0.55);
      box-shadow: 0 28px 80px rgba(101, 24, 130, 0.35);
      animation: popupFloat 1.8s ease-in-out infinite alternate;
    }

    .popup-card h2 {
      margin-bottom: 22px;
      font-size: clamp(2rem, 7vw, 4rem);
      line-height: 1.05;
      text-shadow: 0 8px 26px rgba(133, 30, 120, 0.35);
    }

    .popup-card button {
      margin: 0 auto;
    }

    @keyframes popupFloat {
      from { transform: translateY(0) scale(1); }
      to { transform: translateY(-10px) scale(1.02); }
    }

    main {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .card {
      width: min(850px, 100%);
      padding: 48px 28px;
      border-radius: 34px;
      background: rgba(255, 255, 255, 0.18);
      border: 2px solid rgba(255, 255, 255, 0.45);
      box-shadow: 0 30px 90px rgba(126, 34, 206, 0.35);
      backdrop-filter: blur(18px);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "SAPPHIC ✦ PROM ✦ SAPPHIC ✦ PROM ✦ SAPPHIC ✦ PROM ✦";
      position: absolute;
      top: 20px;
      left: -10%;
      width: 120%;
      white-space: nowrap;
      font-size: 14px;
      letter-spacing: 8px;
      opacity: 0.45;
      animation: marquee 12s linear infinite;
    }

    @keyframes marquee {
      from { transform: translateX(0); }
      to { transform: translateX(-260px); }
    }

    .twice-tag {
      display: inline-block;
      margin-bottom: 24px;
      padding: 10px 18px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.22);
      border: 1px solid rgba(255,255,255,0.55);
      font-size: 0.9rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      animation: glow 2s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from { box-shadow: 0 0 12px rgba(255, 255, 255, 0.35); }
      to { box-shadow: 0 0 32px rgba(255, 255, 255, 0.85); }
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 6.5rem);
      line-height: 1.05;
      font-weight: 900;
      text-shadow: 0 8px 30px rgba(133, 30, 120, 0.35);
    }

    .word {
      display: inline-block;
      opacity: 0;
      transform: translateY(60px) scale(0.6) rotate(-10deg);
      filter: blur(12px);
      animation: popIn 0.8s cubic-bezier(.17,.89,.32,1.45) forwards;
      margin: 0 8px;
    }

    .word:nth-child(1) { animation-delay: 0.2s; }
    .word:nth-child(2) { animation-delay: 0.65s; }
    .word:nth-child(3) { animation-delay: 1.1s; }
    .word:nth-child(4) { animation-delay: 1.55s; }
    .word:nth-child(5) { animation-delay: 2s; }
    .word:nth-child(6) { animation-delay: 2.45s; }
    .word:nth-child(7) { animation-delay: 2.9s; }
    .word:nth-child(8) { animation-delay: 3.35s; }
    .word:nth-child(9) { animation-delay: 3.8s; }
    .word:nth-child(10) { animation-delay: 4.25s; }
    .word:nth-child(11) { animation-delay: 4.7s; }

    @keyframes popIn {
      70% {
        opacity: 1;
        transform: translateY(-8px) scale(1.08) rotate(2deg);
        filter: blur(0);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1) rotate(0deg);
        filter: blur(0);
      }
    }

    .choices {
      margin-top: 38px;
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
      opacity: 0;
      animation: fadeIn 0.8s ease forwards;
      animation-delay: 5.4s;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    label,
    button {
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 24px;
      border: none;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
      color: #ff3fa4;
      font-family: inherit;
      font-size: 1.35rem;
      font-weight: 800;
      box-shadow: 0 14px 30px rgba(94, 23, 135, 0.22);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    label:hover,
    button:hover {
      transform: translateY(-6px) scale(1.05);
      box-shadow: 0 22px 40px rgba(94, 23, 135, 0.35);
    }

    input {
      width: 24px;
      height: 24px;
      accent-color: #ff4fb8;
      cursor: pointer;
    }

    .answer {
      margin-top: 28px;
      min-height: 38px;
      font-size: 1.35rem;
      font-weight: 700;
      opacity: 0;
      transform: translateY(12px);
      transition: 0.35s ease;
    }

    .answer.show {
      opacity: 1;
      transform: translateY(0);
    }

    .disco {
      position: absolute;
      width: 115px;
      height: 115px;
      top: -35px;
      right: 35px;
      border-radius: 50%;
      background:
        linear-gradient(45deg, rgba(255,255,255,0.9) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(255,255,255,0.7) 25%, transparent 25%),
        linear-gradient(135deg, #ff9bd6, #ffffff, #9adfff);
      background-size: 20px 20px, 20px 20px, auto;
      box-shadow: 0 0 50px rgba(255,255,255,0.85);
      animation: spin 7s linear infinite;
      opacity: 0.9;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 600px) {
      body {
        overflow: hidden;
      }

      .surprise-popup {
        padding: max(18px, env(safe-area-inset-top)) 18px max(18px, env(safe-area-inset-bottom));
      }

      .popup-card {
        padding: 30px 20px;
        border-radius: 26px;
      }

      .popup-card h2 {
        font-size: clamp(2.1rem, 12vw, 3.3rem);
      }

      main {
        min-height: 100svh;
        padding: max(14px, env(safe-area-inset-top)) 14px max(14px, env(safe-area-inset-bottom));
        align-items: center;
      }

      .card {
        width: 100%;
        max-height: calc(100svh - 28px);
        padding: 36px 14px 24px;
        border-radius: 28px;
        overflow: hidden;
      }

      .card::before {
        top: 14px;
        font-size: 11px;
        letter-spacing: 5px;
      }

      .twice-tag {
        margin-bottom: 18px;
        padding: 8px 13px;
        font-size: 0.72rem;
        letter-spacing: 2px;
      }

      h1 {
        font-size: clamp(2.25rem, 12.5vw, 4.05rem);
        line-height: 0.98;
      }

      .word {
        margin: 0 3px;
      }

      .choices {
        margin-top: 26px;
        gap: 12px;
      }

      label,
      button {
        width: 100%;
        justify-content: center;
        padding: 14px 18px;
        font-size: 1.1rem;
      }

      input {
        width: 22px;
        height: 22px;
      }

      .answer {
        margin-top: 18px;
        font-size: 1.1rem;
        min-height: 28px;
      }

      .disco {
        width: 70px;
        height: 70px;
        top: -24px;
        right: 14px;
      }
    }

    @media (max-width: 390px) {
      .card {
        padding: 34px 12px 20px;
      }

      h1 {
        font-size: clamp(2rem, 11.5vw, 3.45rem);
      }

      label,
      button {
        padding: 12px 16px;
      }
    }
  </style>
</head>
<body>
  <audio id="promMusic" src="TWICE (트와이스) - YES or YES (Audio) [YES or YES].mp4" loop></audio>

  <div class="surprise-popup" id="surprisePopup">
    <div class="popup-card">
      <h2>Are you ready for a surprise?</h2>
      <button id="startBtn" type="button">yes show me 💕</button>
    </div>
  </div>

  <div class="sparkles"></div>

  <div class="hearts">
    <span>💗</span>
    <span>✨</span>
    <span>💖</span>
    <span>🌟</span>
    <span>💕</span>
  </div>

  <main>
    <section class="card">
      <div class="disco"></div>
      <div class="twice-tag">you're gay</div>

      <h1 aria-label="Lana will you go to the prom with me yes or yes">
        <span class="word">Lana</span>
        <span class="word">will</span>
        <span class="word">you</span>
        <span class="word">go</span>
        <span class="word">to</span>
        <span class="word">the</span>
        <span class="word">prom</span>
        <span class="word">with</span>
        <span class="word">me</span>
        <span class="word">yes</span>
        <span class="word">or yes?</span>
      </h1>

      <div class="choices">
        <label>
          <input type="checkbox" name="answer" />
          yes 💞
        </label>
        <label>
          <input type="checkbox" name="answer" />
          yes ✨
        </label>
        <button id="submitBtn" type="button">submit 💌</button>
      </div>

      <div class="answer" id="answer">pick yes first 💕</div>
    </section>
  </main>

  <script>
    const checkboxes = document.querySelectorAll('input[type="checkbox"]');
    const answer = document.getElementById('answer');
    const submitBtn = document.getElementById('submitBtn');
    const title = document.querySelector('h1');
    const surprisePopup = document.getElementById('surprisePopup');
    const startBtn = document.getElementById('startBtn');
    const promMusic = document.getElementById('promMusic');

    startBtn.addEventListener('click', () => {
      surprisePopup.classList.add('hidden');
      promMusic.play();
      burstHearts();
    });

    checkboxes.forEach((box) => {
      box.addEventListener('change', () => {
        if (box.checked) {
          checkboxes.forEach((other) => {
            if (other !== box) other.checked = false;
          });
          answer.textContent = 'ready to submit? 💕';
          answer.classList.add('show');
        } else {
          answer.classList.remove('show');
        }
      });
    });

    submitBtn.addEventListener('click', () => {
      const pickedYes = [...checkboxes].some((box) => box.checked);

      if (!pickedYes) {
        answer.textContent = 'pick yes first 💕';
        answer.classList.add('show');
        return;
      }

      title.innerHTML = `
        <span class="word">thank</span>
        <span class="word">you</span>
        <span class="word">for</span>
        <span class="word">being</span>
        <span class="word">my</span>
        <span class="word">girlfriend</span>
      `;

      document.querySelector('.twice-tag').textContent = 'best answer ever';
      answer.textContent = 'lets have fun 💖';
      burstHearts();
    });

    function burstHearts() {
      for (let i = 0; i < 18; i++) {
        const heart = document.createElement('div');
        heart.textContent = ['💖', '💕', '✨', '💗'][Math.floor(Math.random() * 4)];
        heart.style.position = 'fixed';
        heart.style.left = `${50 + (Math.random() * 24 - 12)}vw`;
        heart.style.top = `${58 + (Math.random() * 12 - 6)}vh`;
        heart.style.fontSize = `${22 + Math.random() * 24}px`;
        heart.style.pointerEvents = 'none';
        heart.style.zIndex = '10';
        heart.style.animation = `burst ${1.2 + Math.random()}s ease-out forwards`;
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 2200);
      }
    }

    const style = document.createElement('style');
    style.textContent = `
      @keyframes burst {
        from { transform: translate(0, 0) scale(0.5) rotate(0deg); opacity: 1; }
        to { transform: translate(calc(var(--x, 0) * 1px), -160px) scale(1.6) rotate(360deg); opacity: 0; }
      }
    `;
    document.head.appendChild(style);
  </script>
</body>
</html>
